apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-mfe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-mfe
  template:
    metadata:
      labels:
        app: auth-mfe
    spec:
      containers:
        - name: auth-mfe
          image: 192.168.101.30:8443/server-ui-v2-image/auth-mfe
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          volumeMounts:
            - name: tls-cert
              mountPath: /etc/nginx/certs
              readOnly: true
      volumes:
        - name: tls-cert
          secret:
            secretName: auth-mfe-tls

---
apiVersion: v1
kind: Service
metadata:
  name: auth-mfe
spec:
  type: NodePort
  selector:
    app: auth-mfe
  ports:
    - name: http
      port: 443
      targetPort: 443
      nodePort: 31112
